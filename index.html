<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Brainrot Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f1a; color: white; font-family: sans-serif; }
        .menu-card { background-color: #1a2235; border: 1px solid #2d3a55; border-radius: 15px; width: 380px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .stat-box { background-color: #0b0f1a; border: 1px solid #2d3a55; border-radius: 8px; text-align: center; padding: 8px; }
        .progress-bg { background: #0b0f1a; height: 8px; border-radius: 4px; flex-grow: 1; margin: 0 12px; overflow: hidden; }
        .progress-fill { background: #facc15; height: 100%; width: 0%; transition: width 1s; }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen">

    <div class="menu-card relative">
        <div class="text-right text-gray-500 absolute top-4 right-4">✕</div>
        <h1 class="text-center font-bold text-lg mb-4">Brainrot Tracker</h1>

        <div class="flex justify-center mb-6">
            <img id="item-img" src="https://via.placeholder.com/150" class="w-32 drop-shadow-[0_0_10px_#facc15]">
        </div>

        <div class="grid grid-cols-3 gap-2 mb-6">
            <div class="stat-box"><p class="text-[10px] text-gray-400">Total Exists</p><p id="count" class="text-blue-400 font-bold text-sm">0</p></div>
            <div class="stat-box"><p class="text-[10px] text-gray-400">Avg Rebirth</p><p id="rebirths" class="text-green-400 font-bold text-sm">0</p></div>
            <div class="stat-box"><p class="text-[10px] text-gray-400">Avg Coins</p><p class="text-yellow-400 font-bold text-sm">$0</p></div>
        </div>

        <h2 class="text-gray-400 text-[11px] font-bold uppercase mb-3">Mutations</h2>
        
        <div id="mutations-container">
            </div>
    </div>

    <script>
        async function loadData() {
            try {
                const res = await fetch('/api'); // LLAMA A TU API
                const data = await res.json();
                
                // Actualizamos los números
                document.getElementById('count').innerText = data.total || 0;
                document.getElementById('rebirths').innerText = data.avgRebirth || 0;

                // Actualizamos la lista de mutaciones
                const container = document.getElementById('mutations-container');
                container.innerHTML = ''; // Limpiar
                
                for(let mut in data.mutations) {
                    const percent = ((data.mutations[mut] / data.total) * 100).toFixed(1);
                    container.innerHTML += `
                        <div class="flex items-center mb-3 text-[11px]">
                            <span class="w-16 text-yellow-500 font-bold">● ${mut}</span>
                            <div class="progress-bg"><div class="progress-fill" style="width: ${percent}%"></div></div>
                            <span class="text-gray-400">${data.mutations[mut]} (${percent}%)</span>
                        </div>
                    `;
                }
            } catch(e) { console.log("Esperando datos..."); }
        }
        setInterval(loadData, 5000);
        loadData();
    </script>
</body>
</html>
